name: Update index

on:
  push:
    paths:
      - 'topics/*.json'
    branches:
      - main

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate _index.json
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const topicsDir = 'topics';
          const files = fs.readdirSync(topicsDir).filter(f => f.endsWith('.json'));
          const items = files.map(f => {
            const data = JSON.parse(fs.readFileSync(path.join(topicsDir, f), 'utf8'));
            return {
              id: data.title,
              url: 'topics/' + f,
              title: data.title,
              summary: data.description || '',
              tags: data._tags || [],
              _source_count: (data.items || []).length
            };
          });
          const index = {
            version: 'https://jsonfeed.org/version/1.1',
            title: 'Skill Sources',
            description: 'Curated source library for Slideless deck research',
            _generated_at: new Date().toISOString(),
            items
          };
          fs.writeFileSync('_index.json', JSON.stringify(index, null, 2) + '\n');
          console.log('Updated _index.json with ' + items.length + ' topic(s)');
          "

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _index.json
          git diff --cached --quiet || git commit -m "chore: update _index.json" && git push
